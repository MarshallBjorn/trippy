spring.application.name=trippyapi

# The datasource URL, username, and password are provided by environment
# variables in your docker-compose.yml file.

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# It's good practice to disable this to prevent unexpected database queries during view rendering.
spring.jpa.open-in-view=false

# Disable the spring-boot-docker-compose integration. This is the cause of the
# "No Docker Compose file found" error and the subsequent restart loop.
spring.docker.compose.enabled=false

# --- Hot Reload Polling Fix ---
# This forces devtools to actively check for file changes every second.
# It's a reliable workaround for Docker environments (especially on macOS/Windows)
# where filesystem events are not correctly propagated to the container.
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=500ms

